<head>

  <!-- LEFT SIDEBAR -->

    <!-- Logo -->
    <div class="p-6 border-b sticky top-0 bg-white">
      <div class="flex items-center gap-3">
        <img src="../favicon.png" alt="ToolNest" class="w-9 h-9">
        <h1 id="logoText" class="text-2xl font-bold text-purple-700 sidebar-text">ToolNest</h1>
      </div>
    </div>

    <!-- Tools List -->
    <div class="p-4" id="sidebar-list"></div>

    <!-- Resize Arrow -->

  </div>

  <!-- MAIN CONTENT + RIGHT AD -->
  <div class="flex flex-1 min-w-0 relative">

    <!-- Back to Home Button -->
    <a href="../index.html" class="back-to-home-btn lg:block hidden">
      ← Back to Home
    </a>

   
    <!-- Tool Content -->
    <div class="tool-main-content flex-1">
      <div class="max-w-4xl mx-auto px-4 sm:px-6 py-8">

        <!-- Title, Upload, etc. → yeh same rahega -->

      </div>

      <!-- BOTTOM FOOTER BAR -->
      <div class="tool-footer">
        <div class="max-w-4xl mx-auto px-6">
          <div class="flex flex-col md:flex-row justify-between items-center gap-6 text-sm text-zinc-500">
            <div>
              Free tool by <span class="font-semibold text-purple-700">ToolNest</span> — All processing happens in your browser
            </div>
            <div class="flex gap-8">
              <a href="#" class="hover:text-purple-600">How it works</a>
              <a href="#" class="hover:text-purple-600">Privacy</a>
              <a href="#" class="hover:text-purple-600">FAQ</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- RIGHT AD SPACE -->
    <div class="right-ad-space hidden xl:block">
      <!-- AdSense Ad Space -->
      <div class="bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm">
        <div class="text-xs uppercase tracking-widest text-zinc-400 mb-4 text-center">Advertisement</div>
        <div class="h-72 bg-gradient-to-br from-purple-100 to-pink-100 rounded-2xl flex items-center justify-center border border-dashed border-purple-300">

<!-- FIXED COFFEE BUTTON - Bottom Right -->
<a href="#" onclick="alert('Thank you for supporting ToolNest ❤️')" 
   class="coffee-fixed">
  <span class="text-xl">☕</span> 
  Buy me a coffee
</a>

<script>
// Sidebar + Resize Logic (same as before)
const sidebar = document.getElementById('sidebar');
const resizeArrow = document.getElementById('resizeArrow');
let isCollapsed = false;

resizeArrow.addEventListener('click', () => {
  isCollapsed = !isCollapsed;
  if (isCollapsed) {
    sidebar.classList.add('sidebar-collapsed');
    resizeArrow.innerHTML = '→';
  } else {
    sidebar.classList.remove('sidebar-collapsed');
    resizeArrow.innerHTML = '←';
  }
});

// Mobile Toggle
function toggleSidebar() {
  sidebar.classList.toggle('open');
}
</script>
</body>
</html>
