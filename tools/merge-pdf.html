<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF - ToolNest</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="icon" href="../favicon.png">

    <script>
        tailwind.config = {
            content: ["./**/*.html"]
        }
    </script>
</head>
<body class="bg-zinc-50">

<div class="flex min-h-screen">

  <!-- LEFT SIDEBAR -->
  <div id="sidebar" class="w-72 bg-white border-r border-zinc-200 fixed lg:static inset-y-0 left-0 z-50 transform -translate-x-full lg:translate-x-0 transition-transform duration-300 overflow-y-auto">
    <div class="p-6 border-b sticky top-0 bg-white">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <img src="../favicon.png" alt="ToolNest" class="w-9 h-9">
          <h1 class="text-2xl font-bold text-purple-700">ToolNest</h1>
        </div>
        <button onclick="toggleSidebar()" class="lg:hidden text-3xl leading-none">✕</button>
      </div>
    </div>
    <div class="p-4" id="sidebar-list"></div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="flex-1 min-w-0">

    <!-- Mobile Top Bar -->
    <div class="lg:hidden bg-white border-b p-4 flex items-center justify-between sticky top-0 z-40">
      <button onclick="toggleSidebar()" class="text-3xl">☰</button>
      <h1 class="text-xl font-bold text-purple-700">ToolNest</h1>
    </div>

    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-8">

      <!-- Breadcrumb -->
      <div class="text-sm text-zinc-500 mb-6 flex items-center gap-2">
        <a href="../index.html" class="hover:text-purple-600">Home</a>
        <span>›</span>
        <a href="../index.html#pdf" class="hover:text-purple-600">PDF Tools</a>
        <span>›</span>
        <span class="text-purple-700 font-medium">Merge PDF</span>
      </div>

      <!-- Title -->
      <h1 class="text-4xl md:text-5xl font-bold mb-3">Merge PDF</h1>
      <p class="text-zinc-600 text-lg md:text-xl">Combine multiple PDF files into one document - fast, free, and secure</p>

      <!-- Tabs -->
      <div class="flex border-b mt-10 mb-8 overflow-x-auto">
        <div class="tab-active px-6 py-4 border-b-4 border-purple-600 text-purple-700 font-semibold whitespace-nowrap">📎 Merge PDF</div>
        <div class="tab px-6 py-4 text-zinc-500 hover:text-zinc-700 whitespace-nowrap">📖 How to Use</div>
        <div class="tab px-6 py-4 text-zinc-500 hover:text-zinc-700 whitespace-nowrap">❓ FAQ</div>
      </div>

      <!-- Upload Zone -->
      <div id="dropzone" 
           class="upload-zone border-3 border-dashed border-purple-400 bg-purple-50 hover:bg-purple-100 rounded-3xl p-16 md:p-20 text-center cursor-pointer transition-all">
        <div class="text-7xl mb-6">☁️</div>
        <p class="text-2xl md:text-3xl font-medium text-purple-700 mb-3">Click to upload PDF files</p>
        <p class="text-purple-600">or drag and drop multiple files here</p>
        <p class="text-sm text-purple-500 mt-4">Maximum 100MB per file • Your files never leave your device</p>
      </div>

      <!-- Merge Button -->
      <button id="mergeBtn"
              class="mt-10 w-full bg-gradient-to-r from-purple-600 to-violet-600 hover:from-purple-700 hover:to-violet-700 text-white py-5 rounded-3xl text-xl font-semibold transition-all">
        Merge <span id="fileCount">0</span> PDFs
      </button>

      <!-- Result Area -->
      <div id="resultArea" class="hidden mt-8 p-6 bg-white border border-zinc-200 rounded-3xl"></div>
    </div>
  </div>
</div>

<script src="../nav-footer.js"></script>
<script>
// Simple Sidebar Render (same as homepage)
const TOOLS = [ /* yahan homepage wala TOOLS array paste kar sakte ho */ ];

function renderSidebar() {
  const container = document.getElementById('sidebar-list');
  if (!container) return;
  container.innerHTML = TOOLS.map(t => `
    <a href="${t.url}" class="flex items-center gap-3 px-4 py-3 hover:bg-purple-50 rounded-2xl transition-all">
      <span class="text-2xl">${t.icon}</span>
      <span>${t.name}</span>
    </a>
  `).join('');
}

// Mobile Sidebar
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.classList.toggle('-translate-x-full');
}

// Basic Upload Logic
let selectedFiles = 0;

const dropzone = document.getElementById('dropzone');
const mergeBtn = document.getElementById('mergeBtn');
const fileCountEl = document.getElementById('fileCount');

dropzone.addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.multiple = true;
  input.accept = '.pdf';
  input.onchange = (e) => {
    selectedFiles = e.target.files.length;
    fileCountEl.textContent = selectedFiles;
    mergeBtn.textContent = `Merge ${selectedFiles} PDFs`;
  };
  input.click();
});

// Initialize
renderSidebar();
</script>

</body>
</html>
