<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merge PDF - ToolNest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../style.css">
</head>
<body class="bg-zinc-50">

<div class="max-w-6xl mx-auto p-6">
    <h1 class="text-4xl font-bold mb-2">Merge PDF</h1>
    <p class="text-lg text-zinc-600">Combine multiple PDF files into one - fast, free & secure</p>

    <!-- Upload Zone -->
    <div class="mt-10 border-3 border-dashed border-purple-400 bg-purple-50 rounded-3xl p-20 text-center">
        <div class="text-6xl mb-6">☁️</div>
        <p class="text-2xl font-medium text-purple-700">Click to upload PDFs or drag & drop</p>
        <p class="text-purple-500 mt-3">Multiple files allowed • Max 100MB each</p>
    </div>

    <button class="mt-8 w-full bg-gradient-to-r from-purple-600 to-violet-600 text-white py-5 rounded-3xl text-xl font-semibold">
        Merge PDFs
    </button>
</div>

</body>
</html>
