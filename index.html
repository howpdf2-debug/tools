<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToolNest — Free Online Tools</title>
    <meta name="description" content="20+ Free PDF, Image, QR Code & Productivity Tools. No signup, 100% browser-based.">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png">

    <script>
        tailwind.config = {
            content: ["./**/*.html"]
        }
    </script>
</head>
<body class="bg-zinc-50 font-body">

  <!-- Hero Section -->
  <section class="py-16 bg-gradient-to-br from-purple-50 to-amber-50">
    <div class="max-w-5xl mx-auto px-6 text-center">
      <div class="inline-flex items-center gap-3 bg-white border border-purple-200 rounded-3xl px-6 py-3 mb-8 shadow-sm">
        <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
        <span class="font-semibold text-emerald-700">Free • No Signup • Browser-based • Made for India 🇮🇳</span>
      </div>

      <h1 class="text-5xl md:text-6xl font-bold tracking-tight mb-4">
        Free Online Tools
      </h1>
      <p class="text-2xl text-zinc-600 mb-10">PDF • Image • QR Code • More</p>

      <!-- Simple Search -->
      <div class="max-w-xl mx-auto bg-white border border-zinc-300 rounded-3xl p-2 shadow">
        <input type="text" id="searchInput" 
               class="w-full px-6 py-4 text-lg outline-none rounded-3xl" 
               placeholder="Search tools... (merge pdf, compress image)">
      </div>
    </div>
  </section>

  <!-- Tools Grid -->
  <div class="max-w-6xl mx-auto px-6 py-12">
    <h2 class="text-3xl font-bold mb-8">All Tools</h2>
    
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="toolsGrid">
      <!-- JS se tools yahan aayenge -->
    </div>
  </div>

<script>
// Tools Data
const TOOLS = [
  {name: "Compress PDF", desc: "Reduce PDF size without losing quality", icon: "🗜", url: "tools/compress-pdf.html"},
  {name: "Merge PDF", desc: "Combine multiple PDFs into one file", icon: "📎", url: "tools/merge-pdf.html"},
  {name: "Split PDF", desc: "Split PDF into multiple files", icon: "✂️", url: "tools/split-pdf.html"},
  {name: "JPG to PDF", desc: "Convert images to PDF", icon: "📸", url: "tools/jpg-to-pdf.html"},
  {name: "Image Compressor", desc: "Compress images up to 90%", icon: "🖼", url: "tools/image-compress.html"},
  {name: "QR Code Generator", desc: "Create QR codes for URL, WiFi, UPI", icon: "📱", url: "tools/qr-code-generator.html"}
];

// Render Tools
function renderTools() {
  const container = document.getElementById("toolsGrid");
  container.innerHTML = TOOLS.map(tool => `
    <a href="${tool.url}" 
       class="tool-card bg-white border border-zinc-200 rounded-3xl p-8 hover:border-purple-500 hover:shadow-xl transition-all block">
      <div class="text-6xl mb-6">${tool.icon}</div>
      <h3 class="font-bold text-xl mb-2">${tool.name}</h3>
      <p class="text-zinc-600">${tool.desc}</p>
    </a>
  `).join('');
}

renderTools();
</script>

</body>
</html>
